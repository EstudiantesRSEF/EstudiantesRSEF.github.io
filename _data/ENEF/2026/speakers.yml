- name: "Miguel Camarasa"
  institution: ""
  role: "Divulgador científico a través de su canal de YouTube Mates Mike"
  bio: "Miguel Camarasa, conocido en redes como Mates Mike, ha transformado la divulgación científica desde su irrupción en 2020. Graduado en Matemáticas por la Universidad de Valencia y en Ingeniería Aeroespacial por la UPV, culminó su trayectoria académica con un doctorado en el BCAM. Bajo el sello de Mates Mike, utiliza su inconfundible voz y una estética de animaciones sobre fondo negro para que cualquiera pueda visualizar la verdadera esencia de las matemáticas. <br> Su enfoque huye del rigor técnico árido para priorizar la intuición y la comprensión. Una fórmula que sumada a las carismáticas apariciones de sus gatos le ha permitido conectar con una comunidad de más de 385.000 seguidores en YouTube."
  talk_title: ""
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Mates_Mike.jpg.jpeg"
  
- name: "Albert Aparici"
  institution: "Instituto de Física Corpuscular (IFIC) de la Universidad de Valencia."
  role: "Responsable de divulgación en el IFIC y referente científico en la radio, donde dirige secciones como ''La Brújula de la Ciencia'' en Onda Cero."
  bio: "Doctor en Física por la Universidad de Valencia y apasionado por la comunicación, Albert Aparici ha convertido la complejidad de la ciencia en algo accesible para todos. Tras una etapa dedicada a la investigación de la física de neutrinos en el Instituto de Física Corpuscular (IFIC), decidió orientar su carrera hacia la divulgación, donde hoy es una voz de referencia. <br> Actualmente, compagina su labor como Responsable de Comunicación del IFIC con una sólida trayectoria en medios de comunicación. Desde hace más de una década, acerca la ciencia a los oyentes de Onda Cero en La Brújula. Además, comparte su conocimiento en la revista Jot Down y en el programa universitario para mayores La Nau Gran."
  talk_title: ""
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Albert_Aparici.png"

- name: "Jairo Sinova"
  institution: "Johannes Gutenberg Universität Mainz, Germany"
  role: "Catedrático Alexander von Humboldt y Director del Spin Phenomenal Interdisciplinary Center (SPICE)"
  bio: "Jairo Sinova es Catedrático Alexander von Humboldt en la Universidad Johannes Gutenberg de Maguncia, Director del SPICE y Profesor Superior en la Universidad Texas A&M. Galardonado con el ERC Advanced Synergy Grant y Fellow de la American Physical Society, su investigación destaca por el descubrimiento del efecto Hall de espín intrínseco, la predicción del par de torsión espín-órbita de Néel y el descubrimiento del altermagnetismo."
  talk_title: "Altermagnetismo: el surgimiento del magnetismo no convencional multifuncional y su aparición a partir de fases convencionales"
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Sinova-square.png"