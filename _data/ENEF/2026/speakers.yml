- name: "Jairo Sinova"
  institution: "Johannes Gutenberg Universität Mainz, Germany"
  role: "Catedrático Alexander von Humboldt y Director del Spin Phenomenal Interdisciplinary Center (SPICE)"
  bio: "Jairo Sinova es Catedrático Alexander von Humboldt en la Universidad Johannes Gutenberg de Maguncia, Director del SPICE y Profesor Superior en la Universidad Texas A&M. Galardonado con el ERC Advanced Synergy Grant y Fellow de la American Physical Society, su investigación destaca por el descubrimiento del efecto Hall de espín intrínseco, la predicción del par de torsión espín-órbita de Néel y el descubrimiento del altermagnetismo."
  talk_title: "Altermagnetismo: el surgimiento del magnetismo no convencional multifuncional y su aparición a partir de fases convencionales"
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Sinova-square.png"

- name: "Carmen García García"
  institution: "Instituto de Física Corpuscular (IFIC - CSIC)"
  role: "Profesora de Investigación del CSIC"
  bio: "Carmen García García es una destacada física de partículas y Profesora de Investigación del CSIC en el Instituto de Física Corpuscular (IFIC). Su carrera está ligada a grandes hitos de la física de altas energías, destacando su participación clave en el experimento ATLAS del LHC (CERN). <br> Además de su excelencia investigadora, ha desempeñado responsabilidades de gestión científica de primer nivel en España, habiendo sido Coordinadora del Área de Física y Ciencias del Espacio de la Agencia Estatal de Investigación (AEI) y liderando la estrategia nacional en física de partículas. Su labor combina el avance en la tecnología de detectores para futuros colisionadores con un fuerte compromiso con la divulgación científica y la visibilización de las mujeres en la ciencia, consolidándose como uno de los referentes en el panorama nacional e internacional."
  talk_title: ""
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Carmen_Garcia.jpg"

- name: "Andrea Henderson de la Fuente"
  institution: "Universidad de Oxford"
  role: "Astrofísica e investigadora predoctoral"
  bio: "Andrea Henderson es una astrofísica que actualmente realiza su doctorado en la Universidad de Oxford, enfocado en el desarrollo de tecnologías para telescopios. Su trayectoria observacional abarca el control y calibración de instrumentos en el Telescopio Óptico Nórdico (NOT) en La Palma, así como estancias de investigación en el Real Observatorio de Edimburgo. <br> Más allá del ámbito académico, combina la docencia y la divulgación científica en redes sociales con un perfil marcadamente multidisciplinar: compite oficialmente en ajedrez como Maestra FIDE, es guía de astroturismo certificada, buceadora avanzada y bailarina internacional de bachata."
  talk_title: "¿Cómo se llega a ser astrofísica?"
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Andrea_Henderson.jpg"

- name: "Alberto Aparici Benages"
  institution: ""
  role: "Físico y divulgador científico"
  bio: "Alberto Aparici es físico y divulgador científico. Doctorado en física de partículas por la Universidad de Valencia, trabajó durante más de diez años en el Instituto de Física Corpuscular (IFIC) como coordinador de sus actividades de divulgación. En la actualidad se dedica exclusivamente al periodismo y la comunicación científica, siendo jurado del Premio Princesa de Asturias de Investigación Científica y Técnica. <br> En radio, realiza las secciones La Brújula de la Ciencia y Aparici en Órbita en Onda Cero. Además, es un referente en el mundo del podcast, colaborando habitualmente en programas de ciencia como Coffee Break: Señal y Ruido y Oscilador Armónico, y es cocreador de espacios en los que cruza la divulgación con el humor, la educación o el cine, tales como Mochila al Pasado, De Ignorancia Sí que Sé y Esto salía en una peli francesa."
  talk_title: "Cuantizando el mundo: Una brevísima introducción a la teoría cuántica."
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Albert_Aparici.png"

- name: "Paula Desiré Valdor"
  institution: "CERN"
  role: "Investigadora predoctoral en Física de Aceleradores"
  bio: "Paula Desiré realiza actualmente su doctorado enfocado en el campo de la Física de Aceleradores en el CERN (Ginebra). Graduada en el Doble Grado en Física y Matemáticas y con un Máster en Física de Partículas y del Cosmos por la Universidad de Cantabria, desarrolló parte de su trayectoria formativa como becaria en el Instituto de Física de Cantabria (IFCA). <br> Más allá de su labor investigadora, Paula mantiene un perfil muy activo en divulgación científica, compartiendo su pasión por la ciencia en redes sociales y ejerciendo como guía oficial dentro de las propias instalaciones del CERN."
  talk_title: "Los aceleradores del futuro"
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Paula_Desire.jpeg"

- name: "Miguel Camarasa Buades"
  institution: ""
  role: "Matemático, investigador y divulgador en el canal Mates Mike"
  bio: "Miguel Camarasa Buades es matemático, investigador y divulgador científico. Estudió simultáneamente el Grado en Matemáticas y el Grado en Ingeniería Aeroespacial, completando posteriormente un Máster en Investigación Matemática y un Doctorado en Matemáticas especializado en análisis funcional y física matemática, donde ha centrado su investigación en el estudio de operadores diferenciales relacionados con la mecánica cuántica relativista. <br> Paralelamente, desarrolla una exitosa labor de divulgación a través de su canal de YouTube Mates Mike, donde acerca las matemáticas a un público amplio combinando rigor, intuición y explicaciones visuales animadas."
  talk_title: "Matemáticas vs. Física: Infinity War"
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Miguel_Camarasa.jpeg"

- name: "Beatriz Roldán Cuenya"
  institution: "Fritz Haber Institute of the Max Planck Society"
  role: "Directora del Departamento de Ciencia de Interfaces"
  bio: "La Prof. Dr. Beatriz Roldán Cuenya es directora del Departamento de Ciencia de Interfaces y directora interina del Departamento de Química Inorgánica en el Instituto Fritz Haber de Berlín (Alemania). Tras licenciarse en Física en España en 1998 y doctorarse en Alemania en 2001, realizó su investigación postdoctoral en la Universidad de California Santa Bárbara (EE. UU.). Ha sido catedrática de Física en la Universidad de Florida Central y catedrática de Física del Estado Sólido en la Universidad Ruhr de Bochum antes de incorporarse al FHI en 2017. <br> Autora de 300 publicaciones científicas revisadas por pares y 8 patentes, ha dirigido a más de un centenar de investigadores pre y postdoctorales. Es miembro de la Academia Europaea y de la Academia Nacional de Ciencias de Alemania Leopoldina, y forma parte de los consejos editoriales de Journal of Catalysis y Chemical Reviews. Su trayectoria ha sido reconocida con prestigiosos galardones internacionales como el Premio Faraday de la Royal Society of Chemistry del Reino Unido (2022), la Medalla Röntgen (2022), el Premio Paul H. Emmett de la Sociedad Norteamericana de Catálisis (2022), el Premio ACES - Margarita Salas (2025) y el Premio de Investigación de la Sociedad Geográfica Española (2026)."
  talk_title: ""
  talk_time: ""
  image: "/ENEF/2026/img/Ponentes/Beatriz_Roldan.jpg"

