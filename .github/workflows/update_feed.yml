name: Actualizar Feed de Instagram

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser

    - name: Ejecutar script de Python
      run: python update_instagram.py

    - name: Hacer commit y push de los cambios
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .
        
        if ! git diff --cached --quiet; then
          git commit -m "Bot: Actualización limpia del feed e imágenes de Instagram"
          git push
        else
          echo "No hay cambios detectados o el script de Python no generó archivos nuevos."
        fi
