name: Actualizar Feed de Instagram

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 1. SOLUCIÓN AL ERROR 128: Le damos permisos explícitos al bot en el archivo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 2. SOLUCIÓN AL AVISO DE NODE.JS: Actualizamos a la v4 y v5
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install instaloader requests

    - name: Ejecutar script de Python
      run: python update_instagram.py

    - name: Hacer commit y push de los cambios
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 3. SOLUCIÓN AL ERROR 128: Usamos "git add ." para añadir todo lo que haya cambiado.
        # Así, si un día falla Instagram y no hay fotos nuevas, Git no dará error 128 por no encontrarlas.
        git add .
        
        if ! git diff --cached --quiet; then
          git commit -m "Bot: Actualización limpia del feed e imágenes de Instagram"
          git push
        else
          echo "No hay cambios detectados o el script de Python no generó archivos nuevos."
        fi
