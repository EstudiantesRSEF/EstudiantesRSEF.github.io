name: Actualizar Feed de Instagram

on:
  schedule:
    - cron: '0 0 * * *'  # Se ejecuta cada día a medianoche
  workflow_dispatch:     # Permite ejecutarlo a mano desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install instaloader requests

    - name: Ejecutar script de Python
      run: python update_instagram.py

    - name: Hacer commit y push de los cambios
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Añadimos tanto el archivo JSON como la carpeta de las fotos
        git add instagram.json instagram_posts/
        
        if ! git diff --cached --quiet; then
          git commit -m "Bot: Actualización limpia del feed e imágenes de Instagram"
          git push
        else
          echo "No hay cambios detectados en Instagram."
        fi