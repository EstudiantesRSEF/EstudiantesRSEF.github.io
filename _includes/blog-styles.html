<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --azul-marino: #16203F;
        --azul-oscuro: #0E1730;
        --azul-medio: #1B3B6F;
        --azul-claro: #4A7FBF;
        --azul-pastel: #DCE6F5;

        --verde-oscuro: #03572B;
        --verde: #78BE40;
        --verde-hover: #5C9930;
        --verde-pastel: #C8E4B4;

        --rojo: #BD1D3A;
        --rojo-hover: #971730;
        --rojo-pastel: #E5A5B0;

        --fondo: #f4f6fa;
        --texto: #2c2f36;
        --blanco: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: var(--texto); background-color: var(--fondo); line-height: 1.6; }
    h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }

    .btn {
        background-color: var(--verde);
        color: var(--azul-oscuro);
        padding: 12px 24px;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 700;
        transition: all 0.3s;
        display: inline-block;
        border: none;
        cursor: pointer;
    }
    .btn:hover { background-color: var(--verde-hover); transform: translateY(-2px); }
    .btn-small { padding: 9px 18px; font-size: 0.85rem; }

    /* ===== CABECERA DEL BLOG ===== */
    .blog-header {
        position: sticky;
        top: 0; width: 100%;
        background-color: rgba(22, 32, 63, 0.97);
        color: var(--blanco);
        padding: 0.9rem 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        flex-wrap: wrap;
        gap: 15px;
    }
    .blog-header .logo { font-size: 1.15rem; font-weight: 800; color: var(--blanco); display: flex; align-items: center; gap: 15px; }
    .blog-header .logo-img { width: 56px; height: 56px; border-radius: 50%; object-fit: contain; background-color: var(--blanco); padding: 2px; border: 2px solid var(--verde); flex-shrink: 0; }
    .blog-header nav ul { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
    .blog-header nav a { transition: color 0.3s; font-size: 0.92rem; font-weight: 600; }
    .blog-header nav a:hover { color: var(--verde); }

    .dropdown { position: relative; }
    .dropdown-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .dropdown-toggle i { font-size: 0.7rem; transition: transform 0.3s; }
    .dropdown.active .dropdown-toggle i { transform: rotate(180deg); }
    .dropdown-menu {
        position: absolute;
        top: calc(100% + 18px);
        right: 0;
        background-color: var(--blanco);
        min-width: 230px;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        overflow: hidden;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px);
        transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
        z-index: 1001;
    }
    .dropdown:hover .dropdown-menu, .dropdown.active .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-menu li a { display: block; padding: 12px 20px; color: var(--azul-marino); font-weight: 600; font-size: 0.88rem; transition: background 0.25s, color 0.25s; }
    .dropdown-menu li a:hover { background-color: var(--verde-pastel); color: var(--verde-oscuro); }
    .dropdown-menu li:not(:last-child) a { border-bottom: 1px solid #eee; }

    /* ===== CARRUSEL DE SECCIONES (home del blog) ===== */
    .secciones-carousel {
        position: relative;
        height: 62vh;
        min-height: 380px;
        overflow: hidden;
        scroll-snap-type: x mandatory;
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .secciones-carousel::-webkit-scrollbar { display: none; }
    .seccion-slide {
        flex: 0 0 100%;
        scroll-snap-align: start;
        position: relative;
        display: flex;
        align-items: flex-end;
        background-size: cover;
        background-position: center;
    }
    .seccion-slide-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(0deg, rgba(14,23,48,0.88) 0%, rgba(14,23,48,0.35) 55%, rgba(14,23,48,0.15) 100%);
    }
    .seccion-slide-content { position: relative; z-index: 2; padding: 55px 8%; color: var(--blanco); max-width: 800px; }
    .seccion-slide-content h2 { font-size: 2.3rem; margin-bottom: 12px; }
    .seccion-slide-content p { font-size: 1.05rem; color: #dbe4f2; margin-bottom: 18px; }
    .carousel-dots { position: absolute; bottom: 18px; right: 5%; z-index: 3; display: flex; gap: 8px; }
    .carousel-dots button { width: 10px; height: 10px; border-radius: 50%; border: none; background: rgba(255,255,255,0.4); cursor: pointer; padding: 0; }
    .carousel-dots button.active { background: var(--verde); }
    .carousel-arrow {
        position: absolute; top: 50%; transform: translateY(-50%);
        background: rgba(14,23,48,0.6); color: var(--blanco); border: none;
        width: 46px; height: 46px; border-radius: 50%; cursor: pointer; z-index: 3;
        display: flex; align-items: center; justify-content: center; transition: background 0.3s;
    }
    .carousel-arrow:hover { background: var(--verde); }
    .carousel-arrow.prev { left: 18px; }
    .carousel-arrow.next { right: 18px; }

    /* ===== HERO DE SECCIÓN (páginas individuales de sección) ===== */
    .seccion-hero {
        position: relative;
        min-height: 40vh;
        display: flex;
        align-items: flex-end;
        background-size: cover;
        background-position: center;
        color: var(--blanco);
    }
    .seccion-hero-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(14,23,48,0.9) 0%, rgba(14,23,48,0.4) 70%); }
    .seccion-hero-content { position: relative; z-index: 2; padding: 50px 8%; max-width: 900px; }
    .seccion-hero-content h1 { font-size: 2.6rem; margin-bottom: 12px; }
    .seccion-hero-content p { font-size: 1.1rem; color: #dbe4f2; }

    /* ===== LAYOUT PRINCIPAL: TARJETAS + SIDEBAR ===== */
    .blog-layout {
        display: grid;
        grid-template-columns: 2.2fr 1fr;
        gap: 40px;
        max-width: 1300px;
        margin: 0 auto;
        padding: 55px 5% 90px;
        align-items: start;
    }
    .blog-main h2.blog-heading { color: var(--azul-marino); font-size: 1.8rem; margin-bottom: 30px; }

    .filtros-categorias { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 35px; }
    .chip_button {
        background: var(--blanco); border: 2px solid var(--azul-pastel); color: var(--azul-marino);
        padding: 8px 18px; border-radius: 30px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.25s;
    }
    .chip_button:hover, .chip_button.active { background: var(--verde); border-color: var(--verde); color: var(--blanco); }

    .post-card-grid { display: flex; flex-direction: column; gap: 30px; }
    .post-card-large {
        background: var(--blanco);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(22,32,63,0.1);
        transition: transform 0.3s, box-shadow 0.3s;
        display: flex;
        flex-direction: column;
    }
    .post-card-large:hover { transform: translateY(-6px); box-shadow: 0 16px 34px rgba(22,32,63,0.18); }
    .post-card-large .cover { width: 100%; height: 260px; object-fit: cover; }
    .post-card-large .body { padding: 28px 32px 32px; }
    .post-card-large h3 { color: var(--azul-marino); font-size: 1.45rem; margin-bottom: 10px; }
    .post-card-large .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .chip { background: var(--azul-pastel); color: var(--azul-marino); padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .post-card-large .excerpt { color: #555; font-size: 1rem; margin-bottom: 16px; }
    .post-card-large .leer-mas { color: var(--verde-oscuro); font-weight: 700; }
    .post-card-large .leer-mas:hover { color: var(--verde-hover); }

    /* ===== SIDEBAR ===== */
    .sidebar-widget { background: var(--blanco); border-radius: 16px; padding: 26px; box-shadow: 0 8px 24px rgba(22,32,63,0.08); margin-bottom: 28px; }
    .sidebar-widget h3 { color: var(--azul-marino); font-size: 1.15rem; margin-bottom: 20px; }

    .autor-destacado { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .autor-destacado:last-child { margin-bottom: 0; }
    .autor-destacado img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid var(--azul-pastel); }
    .autor-destacado .nombre { font-weight: 700; color: var(--azul-marino); font-size: 0.95rem; }
    .autor-destacado .conteo { font-size: 0.8rem; color: #888; }

    .entrada-destacada { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
    .entrada-destacada:last-child { margin-bottom: 0; }
    .entrada-destacada .num { font-family: 'Montserrat', sans-serif; font-weight: 800; color: var(--verde); font-size: 1.4rem; flex-shrink: 0; width: 26px; }
    .entrada-destacada .titulo { font-size: 0.9rem; font-weight: 600; color: var(--azul-marino); }
    .entrada-destacada .visitas { font-size: 0.78rem; color: #888; margin-top: 3px; }

    /* ===== ENTRADA INDIVIDUAL ===== */
    .post-container { max-width: 820px; margin: 0 auto; padding: 55px 6% 90px; }
    .post-cover { width: 100%; max-height: 420px; object-fit: cover; border-radius: 16px; margin-bottom: 35px; }
    .post-title { color: var(--azul-marino); font-size: 2.3rem; margin-bottom: 20px; }
    .post-meta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 30px; }

    .autor-box { display: flex; align-items: center; gap: 16px; padding: 18px 22px; background: var(--blanco); border-radius: 14px; box-shadow: 0 6px 20px rgba(22,32,63,0.08); margin-bottom: 35px; }
    .autor-box img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--verde-pastel); }
    .autor-box .nombre { font-weight: 700; color: var(--azul-marino); font-size: 1.05rem; }
    .autor-box .universidad { font-size: 0.88rem; color: #777; }
    .autor-box .fecha { font-size: 0.82rem; color: #999; margin-left: auto; white-space: nowrap; }

    .post-stats { display: flex; gap: 24px; margin-bottom: 30px; flex-wrap: wrap; }
    .post-stat { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 600; color: var(--azul-marino); }
    .post-stat i { color: var(--verde); }

    .post-excerpt {
        background: var(--verde-pastel);
        border-left: 5px solid var(--verde);
        padding: 20px 24px;
        border-radius: 8px;
        font-size: 1.1rem;
        font-style: italic;
        color: var(--verde-oscuro);
        margin-bottom: 35px;
    }
    .post-body { font-size: 1.08rem; color: #333; }
    .post-body p { margin-bottom: 18px; }
    .post-body h2, .post-body h3 { color: var(--azul-marino); margin: 30px 0 14px; }

    /* Valoración de estrellas */
    .rating-box { margin: 50px 0 30px; padding: 26px; background: var(--blanco); border-radius: 14px; box-shadow: 0 6px 20px rgba(22,32,63,0.08); text-align: center; }
    .rating-box h3 { color: var(--azul-marino); margin-bottom: 14px; font-size: 1.1rem; }
    .star-rating { display: inline-flex; flex-direction: row-reverse; gap: 4px; }
    .star-rating input { display: none; }
    .star-rating label { font-size: 2rem; color: #d8dce3; cursor: pointer; transition: color 0.2s; }
    .star-rating input:checked ~ label,
    .star-rating label:hover, .star-rating label:hover ~ label { color: var(--verde); }
    .rating-average { font-weight: 700; color: var(--verde-oscuro); margin-top: 12px; font-size: 0.95rem; }
    .rating-note { font-size: 0.8rem; color: #999; margin-top: 6px; }

    /* Comentarios */
    .comentarios-box { margin-top: 40px; }
    .comentarios-box h3 { color: var(--azul-marino); margin-bottom: 18px; font-size: 1.2rem; }

    footer.blog-footer { background: var(--azul-oscuro); color: var(--fondo); text-align: center; padding: 30px; font-size: 0.9rem; font-weight: 600; }
    footer.blog-footer span { color: var(--verde); }

    @media (max-width: 950px) {
        .blog-layout { grid-template-columns: 1fr; }
        .seccion-slide-content h2 { font-size: 1.7rem; }
        .blog-header nav ul { justify-content: center; }
        .autor-box { flex-wrap: wrap; }
        .autor-box .fecha { margin-left: 0; }
    }
</style>
